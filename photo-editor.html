<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editora - Photo Editor</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="editor">

<h1>Photo Editor</h1>

<input type="file" id="imageInput" accept="image/*">

<div class="toolbar">

<button id="rotateBtn">🔄 Rotate</button>

  <label for="saturation">🌈 Saturation</label>

<input
type="range"
id="saturation"
min="0"
max="200"
value="100">
  
  <label for="contrast">🌗 Contrast</label>

<input
type="range"
id="contrast"
min="0"
max="200"
value="100">
  
<label for="brightness">☀ Brightness</label>

<input
type="range"
id="brightness"
min="0"
max="200"
value="100">

</div>

<img id="preview" alt="Your image will appear here">

</div>

<script src="photo-editor.js"></script>

</body>

</html>
